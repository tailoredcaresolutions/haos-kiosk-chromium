name: Build Add-on

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build amd64 image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./haoskiosk
          push: true
          tags: ghcr.io/tailoredcaresolutions/amd64-addon-haoskiosk-chromium:2.0.2,ghcr.io/tailoredcaresolutions/amd64-addon-haoskiosk-chromium:latest
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:latest
            BUILD_VERSION=2.0.2
          labels: |
            io.hass.version=2.0.2
            io.hass.arch=amd64
            io.hass.type=addon
            io.hass.name=HAOS Kiosk Display (Chromium)
